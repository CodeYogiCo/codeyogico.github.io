name: Build & Test

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: a2a-cli-kotlin

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build fat jar
        run: ./gradlew shadowJar --no-daemon

      - name: Smoke test — help output
        run: java -jar build/libs/a2a-cli.jar --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: a2a-cli
          path: a2a-cli-kotlin/build/libs/a2a-cli.jar

